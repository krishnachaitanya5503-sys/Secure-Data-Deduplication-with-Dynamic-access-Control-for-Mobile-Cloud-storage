<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - SecureDedup</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- AOS Animation -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <!-- Three.js for 3D effects -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <style>
        :root {
            --primary-color: #00d4ff;
            --secondary-color: #ff00ff;
            --accent-color: #00ff88;
            --dark-color: #0a0a1a;
            --light-color: #f5f5f5;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-light: #ffffff;
            --text-dark: #333333;
            --neon-blue: #00d4ff;
            --neon-purple: #ff00ff;
            --neon-green: #00ff88;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 50%, #16213e 100%);
            min-height: 100vh;
            color: var(--text-light);
            overflow-x: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 3D Canvas Background */
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        /* Advanced Preloader */
        .loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--dark-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .loader.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loader-content {
            text-align: center;
            position: relative;
        }

        .loader-icon-container {
            position: relative;
            width: 150px;
            height: 150px;
            margin: 0 auto 2rem;
        }

        .loader-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 4rem;
            color: var(--neon-blue);
            z-index: 2;
            animation: pulse 1.5s ease-in-out infinite;
        }

        .loader-ring {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 3px solid transparent;
            border-top-color: var(--neon-blue);
            border-radius: 50%;
            animation: spin 1.5s linear infinite;
        }

        .loader-ring:nth-child(2) {
            width: 80%;
            height: 80%;
            top: 10%;
            left: 10%;
            border-top-color: var(--neon-purple);
            animation-duration: 1.2s;
            animation-direction: reverse;
        }

        .loader-ring:nth-child(3) {
            width: 60%;
            height: 60%;
            top: 20%;
            left: 20%;
            border-top-color: var(--neon-green);
            animation-duration: 0.9s;
        }

        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            50% { transform: translate(-50%, -50%) scale(1.1); opacity: 0.8; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loader-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple), var(--neon-green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .progress-container {
            width: 300px;
            height: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 1rem;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple), var(--neon-green));
            border-radius: 10px;
            width: 0%;
            transition: width 0.3s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.7);
        }

        .progress-bar::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.4),
                transparent
            );
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .progress-percentage {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-light);
            letter-spacing: 1px;
        }

        /* Glass Effect with 3D look */
        .glass-effect {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.3),
                inset 0 0 20px rgba(255, 255, 255, 0.05);
            transform-style: preserve-3d;
            transform: perspective(1000px);
            transition: all 0.3s ease;
        }

        .glass-effect:hover {
            box-shadow: 
                0 12px 40px rgba(0, 0, 0, 0.4),
                inset 0 0 30px rgba(255, 255, 255, 0.1),
                0 0 20px rgba(0, 212, 255, 0.3);
            transform: perspective(1000px) translateZ(10px);
        }

        /* Auth Form */
        .auth-container {
            width: 100%;
            max-width: 450px;
            padding: 2rem;
            z-index: 1;
            position: relative;
        }

        .auth-form {
            width: 100%;
            padding: 2.5rem;
        }

        .auth-form h2 {
            text-align: center;
            margin-bottom: 2rem;
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple), var(--neon-green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .form-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--neon-blue);
        }

        .form-group input {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            border: none;
            border-radius: 10px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            color: var(--text-light);
            border: 1px solid var(--glass-border);
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--neon-blue);
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .input-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--neon-purple);
            font-size: 1.2rem;
            z-index: 2;
        }

        .btn {
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            width: 100%;
            justify-content: center;
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
            z-index: 1;
            margin-top: 1rem;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple));
            z-index: -1;
            transition: all 0.3s ease;
        }

        .btn-primary {
            color: var(--text-light);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.4);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        .btn-primary:hover::before {
            background: linear-gradient(45deg, var(--neon-purple), var(--neon-green));
        }

        /* Advanced Alerts */
        .alert-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            max-width: 400px;
        }

        .alert {
            padding: 1rem 1.5rem;
            margin-bottom: 1rem;
            border-radius: 10px;
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            gap: 1rem;
            animation: slideIn 0.5s ease forwards;
            position: relative;
            overflow: hidden;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .alert-success {
            background: rgba(72, 187, 120, 0.2);
            color: #48bb78;
            border-left: 4px solid #48bb78;
        }

        .alert-error {
            background: rgba(245, 101, 101, 0.2);
            color: #f56565;
            border-left: 4px solid #f56565;
        }

        .alert-warning {
            background: rgba(237, 137, 54, 0.2);
            color: #ed8936;
            border-left: 4px solid #ed8936;
        }

        .alert-info {
            background: rgba(66, 153, 225, 0.2);
            color: #4299e1;
            border-left: 4px solid #4299e1;
        }

        .alert-icon {
            font-size: 1.5rem;
        }

        .alert-close {
            position: absolute;
            top: 10px;
            right: 10px;
            background: none;
            border: none;
            color: inherit;
            font-size: 1.2rem;
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.3s ease;
        }

        .alert-close:hover {
            opacity: 1;
        }

        .auth-links {
            text-align: center;
            margin-top: 1.5rem;
        }

        .auth-links a {
            color: var(--neon-blue);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .auth-links a:hover {
            color: var(--neon-purple);
            text-shadow: 0 0 10px rgba(255, 0, 255, 0.5);
        }

        /* Floating Elements */
        .floating-element {
            position: absolute;
            border-radius: 50%;
            background: var(--glass-bg);
            backdrop-filter: blur(5px);
            border: 1px solid var(--glass-border);
            z-index: 1;
            animation: float 6s ease-in-out infinite;
            box-shadow: 
                0 0 20px rgba(0, 212, 255, 0.2),
                inset 0 0 20px rgba(255, 255, 255, 0.05);
        }

        .floating-element:nth-child(1) {
            width: 80px;
            height: 80px;
            top: 20%;
            left: 10%;
            animation-delay: 0s;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }

        .floating-element:nth-child(2) {
            width: 120px;
            height: 120px;
            top: 60%;
            right: 15%;
            animation-delay: 1s;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.3);
        }

        .floating-element:nth-child(3) {
            width: 60px;
            height: 60px;
            bottom: 20%;
            left: 20%;
            animation-delay: 2s;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
        }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .auth-container {
                max-width: 90%;
                padding: 1rem;
            }
            
            .auth-form {
                padding: 1.5rem;
            }
            
            .auth-form h2 {
                font-size: 1.8rem;
            }
            
            .alert-container {
                right: 10px;
                left: 10px;
                max-width: none;
            }
        }
    </style>
</head>
<body>
    <!-- 3D Canvas Background -->
    <div id="canvas-container"></div>

    <!-- Advanced Preloader -->
    <div class="loader" id="loader">
        <div class="loader-content">
            <div class="loader-icon-container">
                <div class="loader-ring"></div>
                <div class="loader-ring"></div>
                <div class="loader-ring"></div>
                <div class="loader-icon">
                    <i class="fas fa-shield-alt"></i>
                </div>
            </div>
            <div class="loader-text">SecureDedup</div>
            <div class="progress-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <div class="progress-percentage" id="progressPercentage">0%</div>
        </div>
    </div>

    <!-- Floating Elements -->
    <div class="floating-element"></div>
    <div class="floating-element"></div>
    <div class="floating-element"></div>

    <!-- Alert Container -->
    <div class="alert-container" id="alertContainer"></div>

    <!-- Auth Form -->
    <div class="auth-container glass-effect" data-aos="fade-up">
        <form class="auth-form" method="POST">
            <h2><i class="fas fa-user-plus"></i> Register</h2>
            
            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    <div class="flash error">
                        {{ messages[0] }}
                    </div>
                {% endif %}
            {% endwith %}
            
            <div class="form-group">
                <label for="username">Username</label>
                <i class="fas fa-user input-icon"></i>
                <input type="text" id="username" name="username" placeholder="Enter your username" required>
            </div>
            
            <div class="form-group">
                <label for="email">Email</label>
                <i class="fas fa-envelope input-icon"></i>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <i class="fas fa-lock input-icon"></i>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>
            
            <button type="submit" class="btn btn-primary">
                <i class="fas fa-user-plus"></i> Register
            </button>
        </form>
        
        <div class="auth-links">
            <p>Already have an account? <a href="/login"><i class="fas fa-sign-in-alt"></i> Login here</a></p>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        // Initialize AOS
        AOS.init({
            duration: 800,
            easing: 'ease-in-out',
            once: true,
            mirror: false
        });

        // Neural Network + Particles Background
        document.addEventListener('DOMContentLoaded', function() {
            const container = document.getElementById('canvas-container');
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            container.appendChild(renderer.domElement);

            // Create neural network nodes
            const networkGeometry = new THREE.BufferGeometry();
            const networkCount = 200;
            const networkPositions = new Float32Array(networkCount * 3);
            const networkColors = new Float32Array(networkCount * 3);

            for(let i = 0; i < networkCount * 3; i += 3) {
                // Create nodes in a more structured pattern
                const angle = (i / 3) * 0.3;
                const radius = 5 + Math.sin(angle) * 3;
                
                networkPositions[i] = Math.cos(angle) * radius + (Math.random() - 0.5) * 3;
                networkPositions[i + 1] = Math.sin(angle) * radius + (Math.random() - 0.5) * 3;
                networkPositions[i + 2] = (Math.random() - 0.5) * 6;
                
                // Color based on position
                networkColors[i] = 0.0 + Math.random() * 0.3;
                networkColors[i + 1] = 0.8 + Math.random() * 0.2;
                networkColors[i + 2] = 1.0;
            }

            networkGeometry.setAttribute('position', new THREE.BufferAttribute(networkPositions, 3));
            networkGeometry.setAttribute('color', new THREE.BufferAttribute(networkColors, 3));
            
            // Network material with increased size
            const networkMaterial = new THREE.PointsMaterial({
                size: 0.1,
                vertexColors: true,
                transparent: true,
                opacity: 0.9,
                blending: THREE.AdditiveBlending
            });

            // Network mesh
            const networkMesh = new THREE.Points(networkGeometry, networkMaterial);
            scene.add(networkMesh);

            // Create connections between nearby nodes
            const connectionGeometry = new THREE.BufferGeometry();
            const connectionPositions = [];
            const connectionColors = [];

            for(let i = 0; i < networkCount; i++) {
                for(let j = i + 1; j < networkCount; j++) {
                    const dx = networkPositions[i * 3] - networkPositions[j * 3];
                    const dy = networkPositions[i * 3 + 1] - networkPositions[j * 3 + 1];
                    const dz = networkPositions[i * 3 + 2] - networkPositions[j * 3 + 2];
                    const distance = Math.sqrt(dx * dx + dy * dy + dz * dz);
                    
                    if(distance < 3.0) {
                        connectionPositions.push(
                            networkPositions[i * 3], networkPositions[i * 3 + 1], networkPositions[i * 3 + 2],
                            networkPositions[j * 3], networkPositions[j * 3 + 1], networkPositions[j * 3 + 2]
                        );
                        
                        const opacity = 1.0 - (distance / 3.0);
                        connectionColors.push(
                            0.0, 0.8, 1.0, opacity,
                            0.0, 0.8, 1.0, opacity
                        );
                    }
                }
            }

            connectionGeometry.setAttribute('position', new THREE.Float32BufferAttribute(connectionPositions, 3));
            connectionGeometry.setAttribute('color', new THREE.Float32BufferAttribute(connectionColors, 4));
            
            // Connection material with increased opacity
            const connectionMaterial = new THREE.LineBasicMaterial({
                vertexColors: true,
                transparent: true,
                opacity: 0.8,
                blending: THREE.AdditiveBlending
            });

            // Connection mesh
            const connectionMesh = new THREE.LineSegments(connectionGeometry, connectionMaterial);
            scene.add(connectionMesh);

            // Create particles
            const particlesGeometry = new THREE.BufferGeometry();
            const particlesCount = 3000;
            const particlesPositions = new Float32Array(particlesCount * 3);

            for(let i = 0; i < particlesCount * 3; i++) {
                particlesPositions[i] = (Math.random() - 0.5) * 20;
            }

            particlesGeometry.setAttribute('position', new THREE.BufferAttribute(particlesPositions, 3));
            
            // Particles material with increased size
            const particlesMaterial = new THREE.PointsMaterial({
                size: 0.02,
                color: 0x00d4ff,
                transparent: true,
                opacity: 0.7,
                blending: THREE.AdditiveBlending
            });

            // Particles mesh
            const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
            scene.add(particlesMesh);

            camera.position.z = 10;

            // Mouse interaction
            let mouseX = 0;
            let mouseY = 0;

            document.addEventListener('mousemove', (event) => {
                mouseX = event.clientX / window.innerWidth - 0.5;
                mouseY = -event.clientY / window.innerHeight + 0.5;
            });

            // Animation
            const animate = () => {
                requestAnimationFrame(animate);
                
                // Rotate network
                networkMesh.rotation.x += 0.0005;
                networkMesh.rotation.y += 0.001;
                connectionMesh.rotation.x += 0.0005;
                connectionMesh.rotation.y += 0.001;
                
                // Rotate particles
                particlesMesh.rotation.x += 0.0003;
                particlesMesh.rotation.y += 0.0007;
                
                // Mouse interaction
                networkMesh.rotation.x += mouseY * 0.0005;
                networkMesh.rotation.y += mouseX * 0.0005;
                connectionMesh.rotation.x += mouseY * 0.0005;
                connectionMesh.rotation.y += mouseX * 0.0005;
                particlesMesh.rotation.x += mouseY * 0.0003;
                particlesMesh.rotation.y += mouseX * 0.0003;
                
                renderer.render(scene, camera);
            };

            animate();

            // Handle window resize
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        });

        // Advanced Preloader
        document.addEventListener('DOMContentLoaded', function() {
            const loader = document.getElementById('loader');
            const progressBar = document.getElementById('progressBar');
            const progressPercentage = document.getElementById('progressPercentage');
            let progress = 0;
            
            const interval = setInterval(() => {
                progress += Math.random() * 15;
                if (progress > 100) progress = 100;
                
                progressBar.style.width = progress + '%';
                progressPercentage.textContent = Math.floor(progress) + '%';
                
                if (progress >= 100) {
                    clearInterval(interval);
                    setTimeout(() => {
                        loader.classList.add('hidden');
                    }, 500);
                }
            }, 200);
        });

        // Advanced Alert System
        function showAlert(message, type = 'info') {
            const alertContainer = document.getElementById('alertContainer');
            
            // Create alert element
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            
            // Set icon based on type
            let icon = '';
            switch(type) {
                case 'success':
                    icon = 'fas fa-check-circle';
                    break;
                case 'error':
                    icon = 'fas fa-exclamation-circle';
                    break;
                case 'warning':
                    icon = 'fas fa-exclamation-triangle';
                    break;
                case 'info':
                default:
                    icon = 'fas fa-info-circle';
                    break;
            }
            
            // Set alert content
            alert.innerHTML = `
                <div class="alert-icon">
                    <i class="${icon}"></i>
                </div>
                <div class="alert-message">
                    ${message}
                </div>
                <button class="alert-close">
                    <i class="fas fa-times"></i>
                </button>
            `;
            
            // Add alert to container
            alertContainer.appendChild(alert);
            
            // Add event listener to close button
            const closeButton = alert.querySelector('.alert-close');
            closeButton.addEventListener('click', () => {
                alert.style.animation = 'slideIn 0.5s ease reverse';
                setTimeout(() => {
                    alert.remove();
                }, 500);
            });
            
            // Auto-remove after 5 seconds
            setTimeout(() => {
                if (alert.parentNode) {
                    alert.style.animation = 'slideIn 0.5s ease reverse';
                    setTimeout(() => {
                        alert.remove();
                    }, 500);
                }
            }, 5000);
        }

        // Handle flashed messages
        document.addEventListener('DOMContentLoaded', function() {
            // Check for flashed messages from Flask
            const flashMessages = document.querySelectorAll('.flash');
            flashMessages.forEach(message => {
                const messageText = message.textContent.trim();
                let messageType = 'info';
                
                // Determine message type based on content
                if (messageText.toLowerCase().includes('error') || 
                    messageText.toLowerCase().includes('invalid') || 
                    messageText.toLowerCase().includes('failed') ||
                    messageText.toLowerCase().includes('already exists')) {
                    messageType = 'error';
                } else if (messageText.toLowerCase().includes('success') || 
                          messageText.toLowerCase().includes('welcome') ||
                          messageText.toLowerCase().includes('registered')) {
                    messageType = 'success';
                } else if (messageText.toLowerCase().includes('warning') || 
                          messageText.toLowerCase().includes('caution')) {
                    messageType = 'warning';
                }
                
                showAlert(messageText, messageType);
                message.remove();
            });
        });

        // Form submission
        document.addEventListener('DOMContentLoaded', function() {
            const registerForm = document.querySelector('.auth-form');
            
            registerForm.addEventListener('submit', function(e) {
                // Let the form submit normally to Flask backend
                // No need to prevent default
            });
        });
    </script>
</body>
</html>
